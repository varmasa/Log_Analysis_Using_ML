name: CI For ML Model

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s_files/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: saivarma5557/logapp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG

      - name: Update Kubernetes deployment file
        run: |
          sed -i "s|image: .*|image: $IMAGE_NAME:$IMAGE_TAG|g" k8sfiles/deployment.yaml

      - name: Show updated deployment file
        run: |
          cat k8sfiles/deployment.yaml

      - name: Commit updated deployment file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add k8sfiles/deployment.yaml

          git commit -m "Update image tag to $IMAGE_TAG" || echo "No changes to commit"

          git push
