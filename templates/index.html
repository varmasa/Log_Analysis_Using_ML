<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />

    <title>DevOps Log Analyzer</title>

    <link rel="stylesheet"
          href="/static/style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="background-shapes">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="container">

        <div class="glass-card">

            <div class="header">

                <div class="logo-box">
                    <i class="fa-solid fa-server"></i>
                </div>

                <h1>Logs Analyzer Using ML</h1>

                <p>
                    Upload your application logs and
                    instantly analyze incidents,
                    severity, root cause & fixes.
                </p>

            </div>

            <div class="upload-section">

                <label for="logFile"
                       class="upload-box"
                       id="uploadBox">

                    <i class="fa-solid fa-cloud-arrow-up"></i>

                    <h3>Drag & Drop Log File</h3>

                    <p>
                        or click to browse
                    </p>

                    <span id="fileName">
                        No file selected
                    </span>

                </label>

                <input type="file"
                       id="logFile"
                       hidden>

                <button class="analyze-btn"
                        onclick="analyzeLogs()">

                    <i class="fa-solid fa-magnifying-glass-chart"></i>
                    Analyze Logs

                </button>

            </div>

            <div class="loader"
                 id="loader">

                <div class="spinner"></div>
                <p>Analyzing Logs...</p>

            </div>

            <div id="results"
                 class="results-container"></div>

        </div>

    </div>

    <script src="/static/script.js"></script>

</body>

</html>
